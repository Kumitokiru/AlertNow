    const liveAlerts = new Map();
    const recentAlerts = new Map();
    const alertElements = new Map();
    const alertTimers = new Map();
    window.activeMarkers = window.activeMarkers || {};

    function loadStoredAlerts() {
        document.getElementById('live-alert-container').innerHTML = '';
        document.getElementById('recent-alert-container').innerHTML = '';

        fetch('/load_barangay_alerts')
            .then(r => r.json())
            .then(data => {
                data.forEach(alertData => {
                    alertData.expired = false;
                    alertData.emergency_type = alertData.type || alertData.emergency_type;
                    alertData.timestamp = alertData.time || alertData.timestamp;
                    updateUIWithAlert(alertData);
                });
            });
        fetch('/load_barangay_expired')
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('recent-alert-container');
                data.forEach(d => {
                    const row = createExpiredRow(d);
                    container.appendChild(row);
                });
                loadRecentCounts();
            });
    }

    function loadRecentCounts() {
        fetch('/api/barangay_recent_counts')
            .then(r => r.json())
            .then(data => {
                const tot = document.getElementById('stat-total');
                const rd = document.getElementById('stat-road');
                const fr = document.getElementById('stat-fire');
                if (tot) tot.textContent = data.total;
                if (rd) rd.textContent = data.road;
                if (fr) fr.textContent = data.fire;
            })
            .catch(e => console.error("Error loading stats:", e));
    }

    function createExpiredRow(d) {
        const row = document.createElement('tr');
        row.className = 'alert-row';
        row.id = `alert-${d.alert_id}`;
        row.style.cursor = 'pointer';
        row.onclick = () => highlightAlertOnMap(d.alert_id);

        let dateVal = '';
        let timeStr = '';
        try {
            const dObj = new Date(d.time || d.timestamp);
            timeStr = dObj.toLocaleString('en-US', { 
                month: 'short', 
                day: 'numeric', 
                year: 'numeric', 
                hour: 'numeric', 
                minute: '2-digit' 
            });
            dateVal = dObj.getFullYear() + "-" + String(dObj.getMonth() + 1).padStart(2, '0') + "-" + String(dObj.getDate()).padStart(2, '0');
        } catch(e){}

        row.setAttribute('data-date', dateVal);

        row.innerHTML = `
            <td class="status-cell">${
                d.final_status === 'RESPONDED'
                ? '<span class="status-responded" style="color: #27ae60; font-weight: bold;">RESPONDED</span>'
                : '<span class="status-expired" style="color: #95a5a6; font-weight: bold;">LAPSE</span>'
            }</td>
            <td class="time-cell">${timeStr}</td>
            <td class="barangay-cell">${d.barangay}</td>
            <td class="type-cell">${d.type || d.emergency_type || 'Unknown'}</td>
            <td class="image-cell">${d.image ? `<img src="data:image/jpeg;base64,${d.image}" class="alert-thumbnail" style="width:60px; height:60px;" onclick="showImage('${d.image}')"/>` : 'No Image'}</td>
            <td class="actions-cell"></td>
        `;
        return row;
    }

    function moveToRecent(alertId) {
        if (!liveAlerts.has(alertId)) return;
        const { element } = liveAlerts.get(alertId);
        liveAlerts.delete(alertId);
        if (alertTimers.has(alertId)) {
            clearTimeout(alertTimers.get(alertId));
            alertTimers.delete(alertId);
        }
        const statusCell = element.querySelector('.status-cell');
        if(statusCell && !statusCell.querySelector('.status-responded')) {
            statusCell.innerHTML = '<span class="status-expired" style="color: #95a5a6; font-weight: bold;">LAPSE</span>';
        }
        const recentContainer = document.getElementById('recent-alert-container');
        recentContainer.insertBefore(element, recentContainer.firstChild);
        fetch('/expire_barangay_alert', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({alert_id: alertId})
        });
    }

    function setOfficer() {
        const position = document.getElementById('officerPosition').value;
        const name = document.getElementById('officerName').value.trim();
        if (!position || !name) {
            alert("Please select a position and enter a name.");
            return;
        }
        document.getElementById('officerModal').style.display = 'none';
        fetch('/save_officer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ position, name })
        }).then(() => loadRecentOfficers());
        const welcomeSpan = document.createElement('div');
        welcomeSpan.className = 'header-welcome-text';
        welcomeSpan.innerHTML = `
            <span class="welcome-word">Welcome</span>
            <div class="details">
                <span class="position-text">${position}</span>
                <span class="name-text">${name}</span>
            </div>
        `;
        const header = document.querySelector('header');
        if (header) {
            const existingWelcome = header.querySelector('.header-welcome-text');
            if (existingWelcome) existingWelcome.remove();
            header.appendChild(welcomeSpan);
        }
    }

    function loadRecentOfficers() {
        fetch('/get_recent_officers')
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('officerList');
                list.innerHTML = '';
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'officer-item';
                    div.innerHTML = `
                        <div class="officer-date">${item.date}</div>
                        <div class="officer-name">${item.name}</div>
                    `;
                    list.appendChild(div);
                });
            });
    }

    window.addEventListener('load', function() {
        document.getElementById('officerModal').style.display = 'flex';
        loadRecentOfficers();
    });

    function scrollToCharts() {
        const chartsSection = document.querySelector('.prediction-charts-grid');
        if (chartsSection) {
            chartsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }

    document.querySelectorAll('.alert-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.alert-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(tab.dataset.tab + '-alerts-tab').classList.add('active');
        });
    });

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        sidebar.classList.toggle('active');
        mainContent.classList.toggle('shifted');
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadStoredAlerts(); 
        const lat = {{ lat_coord|default(14.0549) }};
        const lon = {{ lon_coord|default(121.3013) }};
        const mapboxToken = 'pk.eyJ1Ijoia3VtaXRva2lydSIsImEiOiJjbWNvZXpkdDQwNmdvMnNyMnNtNGw5NGI1In0.3Y9z5y4saOL76Eb5c-o0UQ';
        const tileLayerUrl = `https://api.mapbox.com/styles/v1/mapbox/satellite-streets-v11/tiles/{z}/{x}/{y}?access_token=${mapboxToken}`;
        const barangayMap = L.map('map').setView([lat, lon], 16);
        var satellite = L.tileLayer(tileLayerUrl, {
            attribution: 'Map data © <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, Imagery © <a href="https://www.mapbox.com/">Mapbox</a>',

            zoomOffset: -1

            attribution: '© OpenStreetMap contributors'

            "Satellite with Labels": satellite,
            "OpenStreetMap": osm

        const ctx = document.getElementById('emergencyTypeChart').getContext('2d');

            type: 'doughnut',
            data: {
                labels: ['Road Accident', 'Crime Incident', 'Fire Incident', 'Health Emergency'],

                    label: 'Emergency Types',
                    data: [0, 0, 0, 0],

                    borderColor: ['#000000ff', '#000000ff', '#000000ff', '#000000ff'],
                    borderWidth: 1
                }]

            options: {
                responsive: true,
                maintainAspectRatio: false,
                aspectRatio: 1.5,
                plugins: {
                    legend: {
                        display: true,
                        position: 'bottom',
                        labels: { color: '#000000', font: { size: 17 } }
                    }
                }
            }
        });

        fetch('/barangay_emergency_types')
            .then(r => r.json())
            .then(data => {
                emergencyTypeChart.data.datasets[0].data = [
                    data['Road Accident'] || 0,
                    data['Crime Incident'] || 0,
                    data['Fire Incident'] || 0,
                    data['Health Emergency'] || 0
                ];
                emergencyTypeChart.update();
            });

        socket.on('update_emergency_types', (data) => {
            emergencyTypeChart.data.datasets[0].data = [
                data['Road Accident'] || 0,
                data['Crime Incident'] || 0,
                data['Fire Incident'] || 0,
                data['Health Emergency'] || 0
            ];
            emergencyTypeChart.update();
        });

        if(typeof updateRoadCharts === 'function') socket.on('update_prediction_charts', updateRoadCharts);
        if(typeof updateFireCharts === 'function') socket.on('update_fire_multi_charts', updateFireCharts);
        if(typeof initializeCharts === 'function') initializeCharts();

        socket.on('connect', () => {
            console.log('Connected to server');
            socket.emit('register_role', { role: 'barangay', barangay: '{{ barangay }}'.toLowerCase() });
        });

        socket.on('new_alert', (data) => {
            console.log('New alert received:', data);
            updateUIWithAlert(data);
            notifyAlert(data);
        });

        socket.on('redirected_alert', (data) => {
            if (data.target_role === 'barangay') {
                updateUIWithAlert(data);
                notifyAlert(data);
            }
        });

        socket.on('update_dashboard_emergency_type', (data) => {
            console.log('Emergency type update received:', data);
            const alertItem = alertElements.get(data.alert_id);
            if (!alertItem) return;
            const typeCell = alertItem.querySelector('.type-cell');
            typeCell.textContent = data.emergency_type || 'N/A';
            const actionsCell = alertItem.querySelector('.actions-cell');
            
            fetch('/update_barangay_alert_type', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    alert_id: data.alert_id,
                    emergency_type: data.emergency_type
                })
            });
            
            const emergencyType = data.emergency_type || 'Road Accident';
            const existingForm = actionsCell.querySelector('.response-form-wrapper');
            if (existingForm) return;
            
            const roleBtns = actionsCell.querySelector('.role-buttons-container');
            if (roleBtns) roleBtns.style.display = 'none';
            showResponseForm(actionsCell, data, emergencyType, roleBtns, typeCell);
        });

        socket.on('hospital_alert_barangay', (data) => {
            console.log('Hospital admission notification received:', data);
            const alertItem = alertElements.get(data.alert_id);
            if (alertItem) {
                const newCell = document.createElement('td');
                newCell.textContent = `Admit to ${data.hospital_name}`;
                newCell.style.fontSize = '12px';
                newCell.style.fontWeight = 'bold';
                newCell.style.color = 'black';
                alertItem.appendChild(newCell);
            }
        });

        socket.on('barangay_response', () => {
            fetch('/get_latest_prediction')
                .then(r => r.json())
                .then(data => updateChartsFromPrediction(data.prediction));
            scrollToCharts();
        });

        socket.on('barangay_fire_submitted', () => {
            fetch('/get_latest_fire_prediction')
                .then(r => r.json())
                .then(data => updateChartsFromPrediction(data.prediction));
            scrollToCharts();
        });

        socket.on('barangay_crime_submitted', (data) => {
            console.log('Crime response submitted:', data);
            const alertItem = alertElements.get(data.alert_id);
            if (alertItem) {
                const predictionText = data.prediction || 'N/A';
                let formattedPrediction = 'N/A';
                if (predictionText !== 'N/A' && predictionText !== 'prediction_error') {
                    const match = predictionText.match(/(\d+\.\d+)% chance in year \d+/);
                    if (match) {
                        const percentage = match[1];
                        const yearRanges = ['A Week', '1-2 Weeks', '2-3 Weeks', '4-5 Weeks', 'A Month', '1-2 Months', '2-3 Months', '4-5 Months'];
                        const randomRange = yearRanges[Math.floor(Math.random() * yearRanges.length)];
                        formattedPrediction = `There will be a ${percentage}% chance of ${data.emergency_type || 'Unknown'} Again within ${randomRange}`;
                    } else {
                        formattedPrediction = predictionText;
                    }
                }
                const predictionCell = document.createElement('td');
                predictionCell.textContent = `Prediction: ${formattedPrediction}`;
                predictionCell.style.fontSize = '12px';
                predictionCell.style.color = 'black';
                alertItem.appendChild(predictionCell);
            }
        });

        socket.on('barangay_health_response', (data) => {
            console.log('Health response submitted:', data);
            const alertItem = alertElements.get(data.alert_id);
            if (alertItem) {
                const predictionText = data.prediction || 'N/A';
                let formattedPrediction = 'N/A';
                if (predictionText !== 'N/A' && predictionText !== 'prediction_error') {
                    const match = predictionText.match(/(\d+\.\d+)% chance in year \d+/);
                    if (match) {
                        const percentage = match[1];
                        const yearRanges = ['A Week', '1-2 Weeks', '2-3 Weeks', '4-5 Weeks', 'A Month', '1-2 Months', '2-3 Months', '4-5 Months'];
                        const randomRange = yearRanges[Math.floor(Math.random() * yearRanges.length)];
                        formattedPrediction = `There will be a ${percentage}% chance of ${data.emergency_type || 'Unknown'} Again within ${randomRange}`;
                    } else {
                        formattedPrediction = predictionText;
                    }
                }
                const predictionCell = document.createElement('td');
                predictionCell.textContent = `Prediction: ${formattedPrediction}`;
                predictionCell.style.fontSize = '12px';
                predictionCell.style.color = 'black';
                alertItem.appendChild(predictionCell);
            }
        });

        socket.on('update_map', (data) => {
            const lat = data.lat || {{ lat_coord|default(14.0549) }};
            const lon = data.lon || {{ lon_coord|default(121.3013) }};
            barangayMap.setView([lat, lon], 16);
            const marker = L.marker([lat, lon]).addTo(barangayMap)
                .bindPopup(`Emergency at ${data.barangay} Resident from ${data.resident_barangay || data.barangay}`)
                .openPopup();
            window.activeMarkers[data.alert_id] = marker;
            document.getElementById('map-coordinates').textContent = `${lat}, ${lon}`;
        });

        function updateUIWithAlert(data) {
            const isLive = data.expired !== true;
            const container = isLive
                ? document.getElementById('live-alert-container')
                : document.getElementById('recent-alert-container');
            if(alertElements.has(data.alert_id)) return; 

            const alertItem = document.createElement('tr');
            alertItem.className = 'alert-row';
            alertItem.id = `alert-${data.alert_id}`;
            alertItem.addEventListener('click', function(e) {
                if (e.target.closest('.actions-cell') || e.target.closest('.image-cell')) {
                    return;   // ← Prevents scroll when clicking Image or Actions
                }
                highlightAlertOnMap(data.alert_id);
            });

            let dateVal = '';
            let timeStr = '';
            try {
                const dObj = new Date(data.timestamp || data.time || Date.now());
                timeStr = dObj.toLocaleString('en-US', { 
                    month: 'short', 
                    day: 'numeric', 
                    year: 'numeric', 
                    hour: 'numeric', 
                    minute: '2-digit' 
                });
                dateVal = dObj.getFullYear() + "-" + String(dObj.getMonth() + 1).padStart(2, '0') + "-" + String(dObj.getDate()).padStart(2, '0');
            } catch(e){}

            alertItem.setAttribute('data-date', dateVal);

            alertItem.innerHTML = `
                <td class="status-cell"><span class="status-pending" style="color: #e74c3c; font-weight: bold;">PENDING</span></td>
                <td class="time-cell">${timeStr}</td>
                <td class="barangay-cell">${data.barangay}</td>
                <td class="type-cell"></td>
                <td class="image-cell">${data.image ? `<img src="data:image/jpeg;base64,${data.image}" class="alert-thumbnail" onclick="showImage('${data.image}')" />` : 'No Image'}</td>
                <td class="actions-cell"></td>
            `;

            const actionsCell = alertItem.querySelector('.actions-cell');
            
            if (isLive) {
                const acceptButton = document.createElement('button');
                acceptButton.textContent = 'Accept';
                acceptButton.className = 'alert-button alert-button-accept';
                
                const declineButton = document.createElement('button');
                declineButton.textContent = 'Decline';
                declineButton.className = 'alert-button alert-button-decline';

                const roleButtonsContainer = document.createElement('div');
                roleButtonsContainer.className = 'role-buttons-container';
                roleButtonsContainer.style.display = 'none';

                const roles = [
                    { label: 'Send to CDRRMO & PNP', value: 'CDRRMO & PNP', type: 'Road Accident' },
                    { label: 'Send to BFP & PNP', value: 'BFP & PNP', type: 'Fire Incident' },
                    { label: 'Send to PNP', value: 'PNP', type: 'Crime Incident' }
                ];
                
                roles.forEach(roleInfo => {
                    const roleButton = document.createElement('button');
                    roleButton.textContent = roleInfo.label;
                    roleButton.className = 'alert-button alert-button-role';
                    roleButton.addEventListener('click', () => {
                        let emergencyType = roleInfo.type;
                        let targetRoles = [];
                        if (roleInfo.value === 'CDRRMO & PNP') targetRoles = ['cdrrmo', 'pnp'];
                        else if (roleInfo.value === 'BFP & PNP') targetRoles = ['bfp', 'pnp'];
                        else if (roleInfo.value === 'PNP') targetRoles = ['pnp'];

                        targetRoles.forEach(tr => {
                            const redirectData = {
                                alert_id: data.alert_id,
                                target_role: tr,
                                emergency_type: emergencyType,
                                municipality: 'San Pablo City',
                                barangay: '{{ barangay }}',
                                lat: data.lat,
                                lon: data.lon,
                                image: data.image, // Pass the original timestamp
                                timestamp: data.timestamp || data.time || new Date().toISOString()
                            };
                            if (tr === 'pnp') socket.emit('pnp_redirect_alert', redirectData);
                            else socket.emit('redirect_alert', redirectData);

                            // EXPLICIT DB STORAGE CALL
                            fetch('/store_forwarded', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify(redirectData)
                            });
                        });

                        socket.emit('update_dashboard_emergency_type', {
                            alert_id: data.alert_id,
                            emergency_type: emergencyType,
                            barangay: '{{ barangay }}'.toLowerCase(),
                            municipality: 'San Pablo City'
                        });

                        roleButtonsContainer.style.display = 'none';
                        const typeCell = alertItem.querySelector('.type-cell');
                        typeCell.textContent = emergencyType;
                        showResponseForm(actionsCell, data, emergencyType, roleButtonsContainer, typeCell);
                    });
                    roleButtonsContainer.appendChild(roleButton);
                });

                if (!data.image) {
                    acceptButton.disabled = true;
                    acceptButton.classList.add('disabled-accept-btn');
                    acceptButton.title = "Cannot accept without an image.";
                } else {
                    acceptButton.addEventListener('click', () => {
                        const modal = document.getElementById('confirmationModal');
                        modal.style.display = 'flex';
                        const yesBtn = document.getElementById('confirmYes');
                        const newYes = yesBtn.cloneNode(true);
                        yesBtn.parentNode.replaceChild(newYes, yesBtn);
                        
                        newYes.onclick = function() {
                            modal.style.display = 'none';
                            socket.emit('role_accepted', { alert_id: data.alert_id, role: 'barangay' });
                            roleButtonsContainer.style.display = 'flex';
                            acceptButton.style.display = 'none';
                            declineButton.style.display = 'none';
                            liveAlerts.set(data.alert_id, { element: alertItem });
                        };
                        
                        const noBtn = document.getElementById('confirmNo');
                        const newNo = noBtn.cloneNode(true);
                        noBtn.parentNode.replaceChild(newNo, noBtn);
                        newNo.onclick = function() { modal.style.display = 'none'; };
                    });
                }

                declineButton.addEventListener('click', () => {
                    socket.emit('role_declined', { alert_id: data.alert_id, role: 'barangay' });
                    if (window.activeMarkers[data.alert_id]) {
                        window.activeMarkers[data.alert_id].remove();
                        delete window.activeMarkers[data.alert_id];
                    }
                    liveAlerts.delete(data.alert_id);
                    recentAlerts.delete(data.alert_id);
                    alertElements.delete(data.alert_id);
                    if(alertTimers.has(data.alert_id)) clearTimeout(alertTimers.get(data.alert_id));
                    alertItem.remove();
                    fetch('/delete_barangay_alert', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({alert_id: data.alert_id})
                    });
                });

                actionsCell.appendChild(acceptButton);
                actionsCell.appendChild(declineButton);
                actionsCell.appendChild(roleButtonsContainer);
            }
            alertElements.set(data.alert_id, alertItem);

            if (isLive) {
                container.insertBefore(alertItem, container.firstChild);
                liveAlerts.set(data.alert_id, { element: alertItem });
            } else {
                container.appendChild(alertItem);
            }
        }

        function showResponseForm(container, data, emergencyType, roleButtonsContainer, typeCell) {
            let formWrapper = container.querySelector('.response-form-wrapper');
            if (!formWrapper) {
                formWrapper = document.createElement('div');
                formWrapper.className = 'response-form-wrapper';
                container.appendChild(formWrapper);
            }
            formWrapper.innerHTML = '';
            const form = document.createElement('div');
            form.className = 'response-form-inline';
            form.style.display = 'flex';
            form.style.flexWrap = 'wrap';
            form.style.gap = '5px';
            
            if (emergencyType === 'Road Accident') {
                const causeTypeSelect = document.createElement('select');
                causeTypeSelect.className = 'dropdown-emergency';
                causeTypeSelect.name = 'combined_cause_type';
                const ctPlaceholder = document.createElement('option');
                ctPlaceholder.text = 'Road Accident Cause and Road Accident Type';
                ctPlaceholder.disabled = true;
                ctPlaceholder.selected = true;
                causeTypeSelect.appendChild(ctPlaceholder);
                const causes = ['Head-on Collision', 'Rear-end Collision', 'Side-impact Collision', 'Single Vehicle Accident', 'Pedestrian Accident'];
                const types = ['Overspeeding', 'Distracted Driving', 'Drunk Driving', 'Reckless Driving', 'Fatigue', 'Inexperience', 'Mechanical Failure', 'Poor Maintenance', 'Overloading'];
                causes.forEach(c => types.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = `${c}, ${t}`;
                    opt.text = `${c}, ${t}`;
                    causeTypeSelect.appendChild(opt);
                }));
                form.appendChild(causeTypeSelect);
                
                const weatherRoadSelect = document.createElement('select');
                weatherRoadSelect.className = 'dropdown-emergency';
                weatherRoadSelect.name = 'combined_weather_road';
                const wrPlaceholder = document.createElement('option');
                wrPlaceholder.text = 'Weather Conditions and Road Conditions';
                wrPlaceholder.disabled = true;
                wrPlaceholder.selected = true;
                weatherRoadSelect.appendChild(wrPlaceholder);
                const weathers = ['Sunny', 'Night', 'Rainy'];
                const roads = ['Dry', 'Wet', 'Dark', 'Potholes', 'Gravel'];
                weathers.forEach(w => roads.forEach(r => {
                    const opt = document.createElement('option');
                    opt.value = `${w}, ${r}`;
                    opt.text = `${w}, ${r}`;
                    weatherRoadSelect.appendChild(opt);
                }));
                form.appendChild(weatherRoadSelect);
                
                const otherFields = ['Vehicle Types', 'Driver Ages', 'Driver Gender'];
                otherFields.forEach(field => {
                    const select = document.createElement('select');
                    select.className = 'dropdown-emergency';
                    select.name = field.toLowerCase().replace(/\s+/g, '_');
                    const placeholder = document.createElement('option');
                    placeholder.text = field;
                    placeholder.disabled = true;
                    placeholder.selected = true;
                    select.appendChild(placeholder);
                    menuData['Road Accident'][field].forEach(opt => {
                        const option = document.createElement('option');
                        option.value = opt;
                        option.text = opt;
                        select.appendChild(option);
                    });
                    form.appendChild(select);
                });
            } else if (emergencyType === 'Fire Incident') {
                const fireSelect = document.createElement('select');
                fireSelect.className = 'dropdown-emergency';
                fireSelect.name = 'fire_cause';
                const firePlaceholder = document.createElement('option');
                firePlaceholder.text = 'Fire Cause';
                firePlaceholder.disabled = true;
                firePlaceholder.selected = true;
                fireSelect.appendChild(firePlaceholder);
                menuData['Fire Incident']['Fire Cause'].forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.text = opt;
                    fireSelect.appendChild(option);
                });
                form.appendChild(fireSelect);
                
                const occupancySelect = document.createElement('select');
                occupancySelect.className = 'dropdown-emergency';
                occupancySelect.name = 'occupancy_type';
                const occPlaceholder = document.createElement('option');
                occPlaceholder.text = 'Occupancy Type';
                occPlaceholder.disabled = true;
                occPlaceholder.selected = true;
                occupancySelect.appendChild(occPlaceholder);
                menuData['Fire Incident']['Occupancy Type'].forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.text = opt;
                    occupancySelect.appendChild(option);
                });
                form.appendChild(occupancySelect);
                
                const classSelect = document.createElement('select');
                classSelect.className = 'dropdown-emergency';
                classSelect.name = 'class';
                const classPlaceholder = document.createElement('option');
                classPlaceholder.text = 'Fire Class';
                classPlaceholder.disabled = true;
                classPlaceholder.selected = true;
                classSelect.appendChild(classPlaceholder);
                Object.keys(menuData['Fire Incident']['Class']).forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.text = opt;
                    classSelect.appendChild(option);
                });
                form.appendChild(classSelect);
            } else if (emergencyType === 'Crime Incident') {
                const crimeFields = Object.keys(menuData['Crime Incident']);
                crimeFields.forEach(field => {
                    const select = document.createElement('select');
                    select.className = 'dropdown-emergency';
                    select.name = field.toLowerCase().replace(/\s+/g, '_');
                    const placeholder = document.createElement('option');
                    placeholder.text = field;
                    placeholder.disabled = true;
                    placeholder.selected = true;
                    select.appendChild(placeholder);
                    menuData['Crime Incident'][field].forEach(opt => {
                        const option = document.createElement('option');
                        option.value = opt;
                        option.text = opt;
                        select.appendChild(option);
                    });
                    form.appendChild(select);
                });
            } else if (emergencyType === 'Health Emergency') {
                const healthFields = Object.keys(menuData['Health Emergency']);
                healthFields.forEach(field => {
                    const select = document.createElement('select');
                    select.className = 'dropdown-emergency';
                    select.name = field.toLowerCase().replace(/\s+/g, '_');
                    const placeholder = document.createElement('option');
                    placeholder.text = field;
                    placeholder.disabled = true;
                    placeholder.selected = true;
                    select.appendChild(placeholder);
                    menuData['Health Emergency'][field].forEach(opt => {
                        const option = document.createElement('option');
                        option.value = opt;
                        option.text = opt;
                        select.appendChild(option);
                    });
                    form.appendChild(select);
                });
            }

            const submitBtn = document.createElement('button');
            submitBtn.textContent = 'Submit';
            submitBtn.className = 'alert-button alert-button-submit';
            submitBtn.onclick = () => {
                const formData = {
                    alert_id: data.alert_id,
                    emergency_type: emergencyType,
                    barangay: '{{ barangay }}'
                };
                if (emergencyType === 'Road Accident') {
                    const combinedCT = form.querySelector('select[name="combined_cause_type"]').value;
                    const combinedWR = form.querySelector('select[name="combined_weather_road"]').value;
                    if (combinedCT) {
                        const [cause, type] = combinedCT.split(', ');
                        formData['road_accident_cause'] = cause;
                        formData['road_accident_type'] = type;
                    }
                    if (combinedWR) {
                        const [weather, road] = combinedWR.split(', ');
                        formData['weather'] = weather;
                        formData['road_condition'] = road;
                    }
                    form.querySelectorAll('select').forEach(s => {
                        if (s.name !== 'combined_cause_type' && s.name !== 'combined_weather_road') {
                            formData[s.name] = s.value;
                        }
                    });
                } else {
                    form.querySelectorAll('select').forEach(s => {
                        formData[s.name] = s.value;
                    });
                }
                const eventMap = {
                    'Road Accident': 'barangay_response',
                    'Fire Incident': 'barangay_fire_submitted',
                    'Crime Incident': 'barangay_crime_submitted',
                    'Health Emergency': 'barangay_health_response'
                };
                socket.emit(eventMap[emergencyType] || 'barangay_response', formData);
                
                formWrapper.innerHTML = '<span style="color: #27ae60; font-weight: bold;">SUBMITTED</span>';
                const row = container.closest('tr');
                if(row) row.querySelector('.status-cell').innerHTML = '<span class="status-responded" style="color: #27ae60; font-weight: bold;">RESPONDED</span>';
                
                const timer = setTimeout(() => {
                    moveToRecent(data.alert_id);
                }, 30000);
                alertTimers.set(data.alert_id, timer);
            };
            form.appendChild(submitBtn);

            const backBtn = document.createElement('button');
            backBtn.textContent = 'Back';
            backBtn.className = 'alert-button alert-button-back';
            backBtn.onclick = () => {
                formWrapper.remove();
                const currentRow = container.closest('tr');
                const actualRoleButtonsContainer = currentRow.querySelector('.role-buttons-container');
                if (actualRoleButtonsContainer) {
                    actualRoleButtonsContainer.style.display = 'flex';
                } else if (roleButtonsContainer) {
                    roleButtonsContainer.style.display = 'flex';
                }
                if (typeCell) {
                    typeCell.textContent = '';
                }
            };
            form.appendChild(backBtn);
            formWrapper.appendChild(form);
        }

        window.showImage = function(base64) {
            document.getElementById('modal-image').src = `data:image/jpeg;base64,${base64}`;
            document.getElementById('image-modal').style.display = 'flex';
        }
        
        document.querySelector('.close-btn').addEventListener('click', () => {
            document.getElementById('image-modal').style.display = 'none';
        });

        function notifyAlert(data) {
            const n = document.getElementById('notification');
            n.textContent = `New Alert: ${data.emergency_type || 'Unknown'} at ${data.barangay}`;
            setTimeout(() => n.textContent = '', 5000);
        }

        socket.on('bfp_responding', (data) => {
            const alertItem = alertElements.get(data.alert_id);
            if (alertItem) {
                const msg = document.createElement('div');
                msg.textContent = 'BFP IS ON THE WAY';
                msg.style.cssText = 'background:#e74c3c;color:white;padding:10px;border-radius:8px;text-align:center;font-weight:bold;margin:10px 0;';
                const actionsCell = alertItem.querySelector('.actions-cell');
                actionsCell.appendChild(msg);
                setTimeout(() => msg.remove(), 5000);
                if (data.bfp_lat && data.bfp_lon) {
                    const bfpMarker = L.marker([data.bfp_lat, data.bfp_lon], {
                        icon: L.divIcon({
                            html: '<div style="background:red;width:30px;height:30px;border-radius:50%;border:4px solid white;animation:pulse 2s infinite;"></div>',
                            className: 'bfp-marker',
                            iconSize: [38, 38],
                            iconAnchor: [19, 19]
                        })
                    }).addTo(barangayMap)
                    .bindPopup('<b>BFP RESPONDING</b><br>Fire Truck En Route')
                    .openPopup();
                    window.activeMarkers[`bfp_${data.alert_id}`] = bfpMarker;
                }
            }
        });

        function determineEmergencyType(role) {
            switch (role.toLowerCase()) {
                case 'cdrrmo': return 'Road Accident';
                case 'bfp': return 'Fire Incident';
                case 'city health': return 'Health Emergency';
                default: return 'Unknown';
            }
        }

        const selectedDates = new Set();

        document.getElementById('add-date-btn')?.addEventListener('click', () => {
            const dateVal = document.getElementById('recent-date-input').value;
            if (dateVal) {
                selectedDates.add(dateVal);
                updateDateDisplay();
                filterRecentTable();
            }
        });

        document.getElementById('clear-dates-btn')?.addEventListener('click', () => {
            selectedDates.clear();
            document.getElementById('recent-date-input').value = '';
            updateDateDisplay();
            filterRecentTable();
        });

        function updateDateDisplay() {
            const display = document.getElementById('selected-dates-display');
            if (selectedDates.size > 0) {
                display.textContent = "Selected Dates: " + Array.from(selectedDates).sort().join(', ');
            } else {
                display.textContent = "";
            }
        }

        function filterRecentTable() {
            document.querySelectorAll('#recent-alert-container .alert-row').forEach(item => {
                if (selectedDates.size === 0) {
                    item.style.display = 'table-row';
                } else {
                    const rowDate = item.getAttribute('data-date');
                    if (selectedDates.has(rowDate)) {
                        item.style.display = 'table-row';
                    } else {
                        item.style.display = 'none';
                    }
                }
            });
        }

        function highlightAlertOnMap(alertId) {
            const mapSection = document.getElementById('map');
            if (mapSection) {
                mapSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            // Highlight the marker if it exists
            if (window.activeMarkers && window.activeMarkers[alertId]) {
                const marker = window.activeMarkers[alertId];
                marker.openPopup();
                
                // Optional: brief flash effect on marker
                if (marker._icon) {
                    const originalColor = marker._icon.style.backgroundColor;
                    marker._icon.style.backgroundColor = '#ff0000';
                    setTimeout(() => {
                        marker._icon.style.backgroundColor = originalColor || '';
                    }, 800);
                }
            } else {
                console.log(`No marker found for alert ${alertId}`);
            }
        }

        document.getElementById('download-csv-btn')?.addEventListener('click', () => {
            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "Status,Date & Time,Barangay,Type\n";

            document.querySelectorAll('#recent-alert-container .alert-row').forEach(row => {
                if (row.style.display !== 'none') {
                    const status = row.querySelector('.status-cell').textContent.trim();
                    const time = row.querySelector('.time-cell').textContent.trim().replace(/"/g, '""');
                    const barangay = row.querySelector('.barangay-cell').textContent.trim();
                    const type = row.querySelector('.type-cell').textContent.trim();
                    
                    csvContent += `"${status}","${time}","${barangay}","${type}"\n`;
                }
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "Recent_Alerts_Barangay.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    });
</script>
