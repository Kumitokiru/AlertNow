                header.prepend(welcomeSpan);

        function setOfficer() {
            const position = document.getElementById('officerPosition').value;
            const name = document.getElementById('officerName').value.trim();

            if (!position || !name) {
                alert('Please select a position and enter a name.');
                return;
            }

            document.getElementById('officerModal').style.display = 'none';

            fetch('/save_officer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ position, name })
            }).then(() => loadRecentOfficers());

            const welcome = document.createElement('span');
            welcome.className = 'header-welcome-text';
            welcome.innerText = `Welcome ${position} ${name}`;

            document.querySelector('header').appendChild(welcome);
        }

        function loadRecentOfficers() {
            fetch('/get_recent_officers')
                .then(r => r.json())
                .then(data => {
                    const list = document.getElementById('officerList');
                    list.innerHTML = '';

                    data.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'officer-item';
                        div.innerHTML = `
                            <div class="officer-date">${item.date}</div>
                            <div class="officer-name">${item.name}</div>
                        `;
                        list.appendChild(div);
                    });
                });
        }

        // Move alert from Live → Recent after 60 seconds
        function moveToRecent(alertId) {
            if (!liveAlerts.has(alertId)) return;
            const { element } = liveAlerts.get(alertId);
            liveAlerts.delete(alertId);
            recentAlerts.set(alertId, { element, timestamp: Date.now() });
            
            element.querySelector('div:first-child').textContent = 'EXPIRED ALERT';
            document.getElementById('recent-alert-container')
                    .insertBefore(element, document.getElementById('recent-alert-container').firstChild);

            function random(min, max) {

            function parsePrediction(full, monthly, julDec) {
                const fullMatch = full.match(/(\d+\.\d+)%/);
                const monthlyMatch = monthly.match(/(\d+\.\d+)%/);
                const julDecMatch = julDec.match(/(\d+\.\d+)%/);
                return {
                    full: fullMatch ? parseFloat(fullMatch[1]) : 50,
                    monthly: monthlyMatch ? parseFloat(monthlyMatch[1]) : 60,
                    julDec: julDecMatch ? parseFloat(julDecMatch[1]) : 70
                };
            }

            function updateRoadCharts(data) {
                const fullText = data.full_year || "2023 Full Year: 50.0% Risk";
                const monthlyText = data.monthly || "2023 Monthly: 60.0% Risk";
                const julDecText = data.jul_dec || "July-Dec 2023: 70.0% Risk";

                const { full, monthly, julDec } = parsePrediction(fullText, monthlyText, julDecText);

                // Base counts from model
                let full2023Count = Math.round((full / 100) * 150);
                let monthly2023Count = Math.round((monthly / 100) * 150);
                let julDec2023Count = Math.round((julDec / 100) * 90);

                // EXTRA RANDOM VARIATION TO PREVENT "STUCK" FEEL
                full2023Count += Math.round(random(-12, 15));     // Stronger variation for yearly point
                monthly2023Count += Math.round(random(-15, 18));
                julDec2023Count += Math.round(random(-18, 20));

                // Clamp to reasonable range (prevents extreme outliers)
                full2023Count = Math.max(60, Math.min(190, full2023Count));
                monthly2023Count = Math.max(70, Math.min(180, monthly2023Count));
                julDec2023Count = Math.max(50, Math.min(130, julDec2023Count));

            function updateFireCharts(data) {

                const sarimaxJulDec  = data.sarimax_jul_dec || "Fire July-Dec 2023 (SARIMAX): 70.0% Risk";

                // Parse all four models
                const arima   = parsePrediction(arimaFull,    arimaMonthly,   arimaJulDec);

                const arimaxFullRand   = Math.round(random(-15, 18));
                const sarimaFullRand   = Math.round(random(-15, 18));
                const sarimaxFullRand  = Math.round(random(-15, 18));

                const arimaxMonthRand  = Math.round(random(-18, 22));

                const arimaxJulRand    = Math.round(random(-20, 25));
                const sarimaJulRand    = Math.round(random(-20, 25));
                const sarimaxJulRand   = Math.round(random(-20, 25));

                const arimaxFullCount   = Math.round((arimax.full   / 100) * 150) + arimaxFullRand;
                const sarimaFullCount   = Math.round((sarima.full   / 100) * 150) + sarimaFullRand;
                const sarimaxFullCount  = Math.round((sarimax.full  / 100) * 150) + sarimaxFullRand;

                const arimaxMonthlyCount = Math.round((arimax.monthly / 100) * 150) + arimaxMonthRand;
                const sarimaMonthlyCount = Math.round((sarima.monthly / 100) * 150) + sarimaMonthRand;
                const sarimaxMonthlyCount = Math.round((sarimax.monthly/ 100) * 150) + sarimaxMonthRand;

                const arimaJulDecCount   = Math.round((arima.julDec   / 100) * 90) + arimaJulRand;
                const arimaxJulDecCount  = Math.round((arimax.julDec  / 100) * 90) + arimaxJulRand;
                const sarimaJulDecCount  = Math.round((sarima.julDec  / 100) * 90) + sarimaJulRand;
                const sarimaxJulDecCount = Math.round((sarimax.julDec / 100) * 90) + sarimaxJulRand;

                // Clamp to realistic range (no negative or absurd numbers)
                const clamp = (val, min, max) => Math.max(min, Math.min(max, val));

                // ───────────────────────────────────────────────────────────────
                // fireYearlyChart — FOUR MOVING LINES + FIXED 2022 ACTUAL
                // ───────────────────────────────────────────────────────────────

                    fireYearlyChart.data.datasets[0].data[3] = 48;  // FIXED 2022 point (example value - adjust if needed)
                    fireYearlyChart.data.datasets[1].data[3] = clamp(arimaFullCount,   60, 190);  // ARIMA
                    fireYearlyChart.data.datasets[2].data[3] = clamp(arimaxFullCount,  60, 190);  // ARIMAX
                    fireYearlyChart.data.datasets[3].data[3] = clamp(sarimaFullCount,  60, 190);  // SARIMA
                    fireYearlyChart.data.datasets[4].data[3] = clamp(sarimaxFullCount, 60, 190);  // SARIMAX

                    fireYearlyChart.options.plugins.title.text = 
                        `Fire Yearly - ARIMA: ${arima.full.toFixed(1)}% | ARIMAX: ${arimax.full.toFixed(1)}% | SARIMA: ${sarima.full.toFixed(1)}% | SARIMAX: ${sarimax.full.toFixed(1)}%`;

                }

                // fireMonthlyChart — FOUR MOVING LINES + FIXED 2022 ACTUAL
                // ───────────────────────────────────────────────────────────────
                if (fireMonthlyChart) {
                    const base2022Fire = [15,18,22,16,25,20,28,30,26,22,19,17];

                    const arimaMonthly2023 = base2022Fire.map(v => {
                        const ratio = arimaMonthlyCount / 92;
                        const variation = random(-18, 22);  // Strong variation → very visible change
                        return clamp(Math.round(v * ratio + variation), 0, 100);
                    });

                    const arimaxMonthly2023 = base2022Fire.map(v => {
                        const ratio = arimaxMonthlyCount / 92;
                        const variation = random(-18, 22);
                        return clamp(Math.round(v * ratio + variation), 0, 100);
                    });

                    const sarimaMonthly2023 = base2022Fire.map(v => {
                        const ratio = sarimaMonthlyCount / 92;
                        const variation = random(-18, 22);
                        return clamp(Math.round(v * ratio + variation), 0, 100);
                    });

                    const sarimaxMonthly2023 = base2022Fire.map(v => {
                        const ratio = sarimaxMonthlyCount / 92;
                        const variation = random(-18, 22);
                        return clamp(Math.round(v * ratio + variation), 0, 100);
                    });

                    fireMonthlyChart.data.datasets[0].data = base2022Fire;              // FIXED 2022 line
                    fireMonthlyChart.data.datasets[1].data = arimaMonthly2023;         // ARIMA moves
                    fireMonthlyChart.data.datasets[2].data = arimaxMonthly2023;        // ARIMAX moves
                    fireMonthlyChart.data.datasets[3].data = sarimaMonthly2023;        // SARIMA moves
                    fireMonthlyChart.data.datasets[4].data = sarimaxMonthly2023;       // SARIMAX moves

                    fireMonthlyChart.options.plugins.title.text = 
                        `Fire Monthly - ARIMA: ${arima.monthly.toFixed(1)}% | ARIMAX: ${arimax.monthly.toFixed(1)}% | SARIMA: ${sarima.monthly.toFixed(1)}% | SARIMAX: ${sarimax.monthly.toFixed(1)}%`;

                    fireMonthlyChart.update('active');
                }

                // ───────────────────────────────────────────────────────────────
                // fireJulDecChart — FOUR MOVING LINES + FIXED 2022 ACTUAL
                // ───────────────────────────────────────────────────────────────
                if (fireJulDecChart) {
                    const baseJulDecFire = [28,30,26,22,19,17];

                    const arimaJulDec2023 = baseJulDecFire.map(v => {
                        const ratio = arimaJulDecCount / 75;
                        const variation = random(-20, 25);  // Very strong → dramatic movement every time
                        return clamp(Math.round(v * ratio + variation), 0, 100);
                    });

                    const arimaxJulDec2023 = baseJulDecFire.map(v => {
                        const ratio = arimaxJulDecCount / 75;
                        const variation = random(-20, 25);
                        return clamp(Math.round(v * ratio + variation), 0, 100);

                    const roleButton = document.createElement('button');
                    roleButton.textContent = roleInfo.label;
                    roleButton.className = 'alert-button alert-button-role';

                    roleButton.addEventListener('click', () => {
                        let emergencyType = roleInfo.type;
                        let targetRoles = [];

                        if (roleInfo.value === 'CDRRMO & PNP') {
                            targetRoles = ['cdrrmo', 'pnp'];
                        } else if (roleInfo.value === 'BFP & PNP') {
                            targetRoles = ['bfp', 'pnp'];
                        } else if (roleInfo.value === 'PNP') {
                            targetRoles = ['pnp'];
                        }

                        targetRoles.forEach(tr => {
                            const redirectData = {
                                alert_id: data.alert_id,
                                target_role: tr,
                                emergency_type: emergencyType,
                                municipality: 'San Pablo City',

                            };

                            }

                            barangay: '{{ barangay }}'.toLowerCase(),
                            municipality: 'San Pablo City'
                        });

                    // Combined Cause & Type
                    const causeTypeSelect = document.createElement('select');
                    causeTypeSelect.className = 'dropdown-emergency';
                    causeTypeSelect.name = 'combined_cause_type';
                    const ctPlaceholder = document.createElement('option');
                    ctPlaceholder.text = 'Road Accident Cause and Road Accident Type';
                    ctPlaceholder.disabled = true;
                    ctPlaceholder.selected = true;
                    causeTypeSelect.appendChild(ctPlaceholder);
                    
                    const causes = ['Head-on Collision', 'Rear-end Collision', 'Side-impact Collision', 'Single Vehicle Accident', 'Pedestrian Accident'];
                    const types = ['Overspeeding', 'Distracted Driving', 'Drunk Driving', 'Reckless Driving', 'Fatigue', 'Inexperience', 'Mechanical Failure', 'Poor Maintenance', 'Overloading'];
                    causes.forEach(c => types.forEach(t => {
                        const opt = document.createElement('option');
                        opt.value = `${c}, ${t}`;
                        opt.text = `${c}, ${t}`;
                        causeTypeSelect.appendChild(opt);
                    }));
                    form.appendChild(causeTypeSelect);

                    // Combined Weather & Road
                    const weatherRoadSelect = document.createElement('select');
                    weatherRoadSelect.className = 'dropdown-emergency';
                    weatherRoadSelect.name = 'combined_weather_road';
                    const wrPlaceholder = document.createElement('option');
                    wrPlaceholder.text = 'Weather Conditions and Road Conditions';
                    wrPlaceholder.disabled = true;
                    wrPlaceholder.selected = true;
                    weatherRoadSelect.appendChild(wrPlaceholder);

                    const weathers = ['Sunny', 'Night', 'Rainy'];
                    const roads = ['Dry', 'Wet', 'Dark', 'Potholes', 'Gravel'];
                    weathers.forEach(w => roads.forEach(r => {
                        const opt = document.createElement('option');
                        opt.value = `${w}, ${r}`;
                        opt.text = `${w}, ${r}`;
                        weatherRoadSelect.appendChild(opt);
                    }));
                    form.appendChild(weatherRoadSelect);

                    // Other Road Accident Fields
                    const otherFields = ['Vehicle Types', 'Driver Ages', 'Driver Gender'];
                    otherFields.forEach(field => {
                        const select = document.createElement('select');
                        select.className = 'dropdown-emergency';
                        select.name = field.toLowerCase().replace(/\s+/g, '_');
                        const placeholder = document.createElement('option');
                        placeholder.text = field;
                        placeholder.disabled = true;
                        placeholder.selected = true;
                        select.appendChild(placeholder);
                        menuData['Road Accident'][field].forEach(opt => {
                            const option = document.createElement('option');
                            option.value = opt;
                            option.text = opt;
                            select.appendChild(option);
                        });
                        form.appendChild(select);
                    });

                } else if (emergencyType === 'Fire Incident') {
                    // Combined Fire Cause with Occupancy Type
                    const fireSelect = document.createElement('select');
                    fireSelect.className = 'dropdown-emergency';
                    fireSelect.name = 'fire_cause';
                    const firePlaceholder = document.createElement('option');
                    firePlaceholder.text = 'Fire Cause';
                    firePlaceholder.disabled = true;
                    firePlaceholder.selected = true;
                    fireSelect.appendChild(firePlaceholder);
                    menuData['Fire Incident']['Fire Cause'].forEach(opt => {
                        const option = document.createElement('option');
                        option.value = opt;
                        option.text = opt;
                        fireSelect.appendChild(option);
                    });
                    form.appendChild(fireSelect);

                    const occupancySelect = document.createElement('select');
                    occupancySelect.className = 'dropdown-emergency';
                    occupancySelect.name = 'occupancy_type';
                    const occPlaceholder = document.createElement('option');
                    occPlaceholder.text = 'Occupancy Type';
                    occPlaceholder.disabled = true;
                    occPlaceholder.selected = true;
                    occupancySelect.appendChild(occPlaceholder);
                    menuData['Fire Incident']['Occupancy Type'].forEach(opt => {
                        const option = document.createElement('option');
                        option.value = opt;
                        option.text = opt;
                        occupancySelect.appendChild(option);
                    });
                    form.appendChild(occupancySelect);

                    const classSelect = document.createElement('select');
                    classSelect.className = 'dropdown-emergency';
                    classSelect.name = 'class';
                    const classPlaceholder = document.createElement('option');
                    classPlaceholder.text = 'Fire Class';
                    classPlaceholder.disabled = true;
                    classPlaceholder.selected = true;
                    classSelect.appendChild(classPlaceholder);
                    Object.keys(menuData['Fire Incident']['Class']).forEach(opt => {
                        const option = document.createElement('option');
                        option.value = opt;
                        option.text = opt;
                        classSelect.appendChild(option);
                    });
                    form.appendChild(classSelect);

                } else if (emergencyType === 'Crime Incident') {
                    const crimeFields = Object.keys(menuData['Crime Incident']);
                    crimeFields.forEach(field => {
                        const select = document.createElement('select');
                        select.className = 'dropdown-emergency';
                        select.name = field.toLowerCase().replace(/\s+/g, '_');
                        const placeholder = document.createElement('option');
                        placeholder.text = field;
                        placeholder.disabled = true;
                        placeholder.selected = true;
                        select.appendChild(placeholder);
                        menuData['Crime Incident'][field].forEach(opt => {
                            const option = document.createElement('option');
                            option.value = opt;
                            option.text = opt;
                            select.appendChild(option);
                        });
                        form.appendChild(select);
                    });

                } else if (emergencyType === 'Health Emergency') {
                    const healthFields = Object.keys(menuData['Health Emergency']);
                    healthFields.forEach(field => {
                        const select = document.createElement('select');
                        select.className = 'dropdown-emergency';
                        select.name = field.toLowerCase().replace(/\s+/g, '_');
                        const placeholder = document.createElement('option');
                        placeholder.text = field;
                        placeholder.disabled = true;
                        placeholder.selected = true;
                        select.appendChild(placeholder);
                        menuData['Health Emergency'][field].forEach(opt => {
                            const option = document.createElement('option');
                            option.value = opt;
                            option.text = opt;
                            select.appendChild(option);
                        });
                        form.appendChild(select);
                    });
                }

                const submitBtn = document.createElement('button');
                submitBtn.textContent = 'Submit';
                submitBtn.className = 'alert-button alert-button-submit';
                submitBtn.onclick = () => {
                    const formData = {
                        alert_id: data.alert_id,
                        emergency_type: emergencyType,
                        barangay: '{{ barangay }}'
                    };

                    if (emergencyType === 'Road Accident') {
                        const combinedCT = form.querySelector('select[name="combined_cause_type"]').value;
                        const combinedWR = form.querySelector('select[name="combined_weather_road"]').value;
                        
                        if (combinedCT) {
                            const [cause, type] = combinedCT.split(', ');
                            formData['road_accident_cause'] = cause;
                            formData['road_accident_type'] = type;
                        }
                        if (combinedWR) {
                            const [weather, road] = combinedWR.split(', ');
                            formData['weather'] = weather;
                            formData['road_condition'] = road;
                        }
                        
                        form.querySelectorAll('select').forEach(s => {
                            if (s.name !== 'combined_cause_type' && s.name !== 'combined_weather_road') {
                                formData[s.name] = s.value;
                            }
                        });
                    } else {
                        form.querySelectorAll('select').forEach(s => {
                            formData[s.name] = s.value;
                        });
                    }

                    const eventMap = {
                        'Road Accident': 'barangay_response',
                        'Fire Incident': 'barangay_fire_submitted',
                        'Crime Incident': 'barangay_crime_submitted',
                        'Health Emergency': 'barangay_health_response'
                    };
                    socket.emit(eventMap[emergencyType] || 'barangay_response', formData);
                    
                    container.innerHTML = '<span style="color: #27ae60; font-weight: bold;">SUBMITTED</span>';
                    const row = container.closest('tr');
                    if(row) row.querySelector('.status-cell').innerHTML = '<span class="status-responded" style="color: #27ae60; font-weight: bold;">RESPONDED</span>';


                    setTimeout(() => moveToRecent(data.alert_id), 60000);
                };
                form.appendChild(submitBtn);
                container.appendChild(form);
            }

            window.showImage = function(base64) {
                document.getElementById('modal-image').src = `data:image/jpeg;base64,${base64}`;
                document.getElementById('image-modal').style.display = 'flex';
            }

            document.getElementById('recent-date-filter')?.addEventListener('change', (e) => {
                const selected = e.target.value;
                document.querySelectorAll('#recent-alert-container .alert-row').forEach(item => {
                    const date = new Date().toISOString().slice(0,10);
                    item.style.display = (!selected || date === selected) ? 'table-row' : 'none';
                });
            });

            function notifyAlert(data) {
                const n = document.getElementById('notification');
                n.textContent = `New Alert: ${data.emergency_type || 'Unknown'} at ${data.barangay}`;
                setTimeout(() => n.textContent = '', 5000);
            }

            socket.on('bfp_responding', (data) => {
                const alertItem = alertElements.get(data.alert_id);
                if (alertItem) {
                    const msg = document.createElement('div');
                    msg.textContent = 'BFP IS ON THE WAY';
                    msg.style.cssText = 'background:#e74c3c;color:white;padding:10px;border-radius:8px;text-align:center;font-weight:bold;margin:10px 0;';
                    
                    const actionsCell = alertItem.querySelector('.actions-cell');
                    actionsCell.appendChild(msg);
                    setTimeout(() => msg.remove(), 5000);

                    if (data.bfp_lat && data.bfp_lon) {
                        const bfpMarker = L.marker([data.bfp_lat, data.bfp_lon], {
                            icon: L.divIcon({
                                html: '<div style="background:red;width:30px;height:30px;border-radius:50%;border:4px solid white;animation:pulse 2s infinite;"></div>',
                                className: 'bfp-marker',
                                iconSize: [38, 38],
                                iconAnchor: [19, 19]
                            })
                        }).addTo(barangayMap)
                        .bindPopup('<b>BFP RESPONDING</b><br>Fire Truck En Route')
                        .openPopup();

                        window.activeMarkers[`bfp_${data.alert_id}`] = bfpMarker;
                    }
                }
            });

            function determineEmergencyType(role) {
                switch (role.toLowerCase()) {
                    case 'cdrrmo': return 'Road Accident';
                    case 'bfp': return 'Fire Incident';
                    case 'city health': return 'Health Emergency';
                    default: return 'Unknown';
                }
            }
        });
    </script>
