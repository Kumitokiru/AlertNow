        function moveToRecent(alertId) {
            if (!liveAlerts.has(alertId)) return;

        let yearlyPredictionChart = null;

        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        function parsePrediction(full, monthly, julDec) {
            const fullMatch = full.match(/(\d+\.\d+)%/);
            const monthlyMatch = monthly.match(/(\d+\.\d+)%/);
            const julDecMatch = julDec.match(/(\d+\.\d+)%/);
            return {
                full: fullMatch ? parseFloat(fullMatch[1]) : 50,
                monthly: monthlyMatch ? parseFloat(monthlyMatch[1]) : 60,
                julDec: julDecMatch ? parseFloat(julDecMatch[1]) : 70
            };
        }

        function updateAllCharts(data) {
                const fullText = data.full_year || "2023 Full Year: 50.0% Risk";
                const monthlyText = data.monthly || "2023 Monthly: 60.0% Risk";
                const julDecText = data.jul_dec || "July-Dec 2023: 70.0% Risk";

                const { full, monthly, julDec } = parsePrediction(fullText, monthlyText, julDecText);

                // Base counts from model
                let full2023Count = Math.round((full / 100) * 150);
                let monthly2023Count = Math.round((monthly / 100) * 150);
                let julDec2023Count = Math.round((julDec / 100) * 90);

                // EXTRA RANDOM VARIATION TO PREVENT "STUCK" FEEL
                full2023Count += Math.round(random(-12, 15));     // Stronger variation for yearly point
                monthly2023Count += Math.round(random(-15, 18));
                julDec2023Count += Math.round(random(-18, 20));

                // Clamp to reasonable range (prevents extreme outliers)
                full2023Count = Math.max(60, Math.min(190, full2023Count));
                monthly2023Count = Math.max(70, Math.min(180, monthly2023Count));
                julDec2023Count = Math.max(50, Math.min(130, julDec2023Count));

                if (yearlyPredictionChart) {
                    yearlyPredictionChart.data.datasets[0].data[3] = full2023Count;
                    yearlyPredictionChart.options.plugins.title.text = fullText;
                    yearlyPredictionChart.update('active');
                }

                // monthlyComparisonChart - LINES CHANGE SHAPE EVERY TIME
                if (monthlyComparisonChart) {
                    const base2022 = [28,32,35,30,40,38,42,45,41,36,33,30];
                    const monthly2023 = base2022.map(v => {
                        const ratio = monthly2023Count / 92;
                        const variation = random(-18, 22);  // Increased range for more movement
                        return Math.max(0, Math.round(v * ratio + variation));
                    });
                    monthlyComparisonChart.data.datasets[1].data = monthly2023;
                    monthlyComparisonChart.options.plugins.title.text = monthlyText;
                    monthlyComparisonChart.update('active');
                }

                // julDecChart - LINES CHANGE SHAPE EVERY TIME
                if (julDecChart) {
                    const baseJulDec2022 = [42,45,41,36,33,30];
                    const forecastJulDec = baseJulDec2022.map(v => {
                        const ratio = julDec2023Count / 75;
                        const variation = random(-20, 25);  // Increased range for dramatic change
                        return Math.max(0, Math.round(v * ratio + variation));
                    });
                    julDecChart.data.datasets[1].data = [null,null,null,null,null,null,...forecastJulDec];
                    julDecChart.options.plugins.title.text = julDecText;
                    julDecChart.update('active');
                }

                // Auto-scroll to charts
                document.querySelector('.prediction-charts-grid')?.scrollIntoView({ behavior: 'smooth' });
            }

            function parseMenuText(text) {
                const sections = text.split('#').filter(s => s.trim());
                const menu = {};
                sections.forEach(section => {
                    const lines = section.trim().split('\n');
                    const sectionName = lines[0].trim();
                    const options = {};
                    lines.slice(1).forEach(line => {
                        const [key, values] = line.split(':');
                        options[key.trim()] = values.split(',').map(v => v.trim());
                    });
                    menu[sectionName] = options;
                });
                return menu;
            }

                    <td class="time-cell">${new Date().toLocaleTimeString()}</td>
                    <td class="barangay-cell">${data.barangay}</td>
                    <td class="type-cell">${data.emergency_type || 'Road Accident'}</td>
                    <td class="image-cell">${data.image ? `<img src="data:image/jpeg;base64,${data.image}" class="alert-thumbnail" onclick="showImage('${data.image}')" style="width:60px; height:60px; cursor:pointer; border-radius: 4px;" />` : 'No Image'}</td>
                    <td class="actions-cell"></td>
                `;

                const actionsCell = alertItem.querySelector('.actions-cell');
                
                // SHOW RESPONSE FORM DIRECTLY (Combined Dropdowns)
                showResponseForm(actionsCell, data);

                alertElements.set(data.alert_id, alertItem);
                container.appendChild(alertItem);
                alertItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                updateTotalIncidents();

                    // Auto-scroll to new alert
                    alertItem.scrollIntoView({ behavior: 'smooth', block: 'center' });

                    
            }

            // Listen for alerts redirected from Barangay
            socket.on('cdrrmo_alert', (data) => {
                console.log('New alert received for CDRRMO:', data);
                updateUIWithAlert(data);
            });

            // === PREDICTION RESPONSE ===
            socket.on('cdrrmo_response', (data) => {
                // Update prediction text if visible
                const alertItem = alertElements.get(data.alert_id);
                if (alertItem) {
                    const predContainer = alertItem.querySelector('.actions-cell .prediction-text');
                    if (predContainer) {
                        // Similar logic to Barangay prediction formatting
                        const predictionText = data.prediction || 'N/A';
                        let formattedPrediction = 'N/A';
                        if (predictionText !== 'N/A' && predictionText !== 'prediction_error') {
                            const match = predictionText.match(/(\d+\.\d+)% chance/); 
                            if (match) formattedPrediction = predictionText; // Use raw or format better
                            else formattedPrediction = predictionText;
                        }
                        predContainer.textContent = `Prediction: ${formattedPrediction}`;
                    }
                }
                fetch('/get_latest_prediction').then(r=>r.json()).then(d=>updateAllCharts({full_year:d.prediction}));
                document.querySelector('.prediction-charts-grid')?.scrollIntoView({ behavior: 'smooth' });
            });

            function showResponseForm(container, data) {
                container.innerHTML = '';
                const form = document.createElement('div');
                form.className = 'response-form-inline';
                form.style.display = 'flex';
                form.style.flexWrap = 'wrap';
                form.style.gap = '5px';

                // Combined Cause & Type
                const causeTypeSelect = document.createElement('select');
                causeTypeSelect.className = 'dropdown-emergency';
                causeTypeSelect.name = 'combined_cause_type';
                const ctPlaceholder = document.createElement('option');
                ctPlaceholder.text = 'Road Accident Cause and Road Accident Type';
                ctPlaceholder.disabled = true;
                ctPlaceholder.selected = true;
                causeTypeSelect.appendChild(ctPlaceholder);
                
                menuData['Road Accident']['Combined Cause and Type'].forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.text = opt;
                    causeTypeSelect.appendChild(option);
                });
                form.appendChild(causeTypeSelect);

                // Combined Weather & Road
                const weatherRoadSelect = document.createElement('select');
                weatherRoadSelect.className = 'dropdown-emergency';
                weatherRoadSelect.name = 'combined_weather_road';
                const wrPlaceholder = document.createElement('option');
                wrPlaceholder.text = 'Weather Conditions and Road Conditions';
                wrPlaceholder.disabled = true;
                wrPlaceholder.selected = true;
                weatherRoadSelect.appendChild(wrPlaceholder);

                menuData['Road Accident']['Combined Weather and Road'].forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.text = opt;
                    weatherRoadSelect.appendChild(option);
                });
                form.appendChild(weatherRoadSelect);

                // Other Fields
                const otherFields = ['Vehicle Types', 'Driver Ages', 'Driver Gender'];
                otherFields.forEach(field => {
                    const select = document.createElement('select');
                    select.className = 'dropdown-emergency';
                    select.name = field.toLowerCase().replace(/\s+/g, '_');
                    const placeholder = document.createElement('option');
                    placeholder.text = field;
                    placeholder.disabled = true;
                    placeholder.selected = true;
                    select.appendChild(placeholder);
                    menuData['Road Accident'][field].forEach(opt => {
                        const option = document.createElement('option');
                        option.value = opt;
                        option.text = opt;
                        select.appendChild(option);
                    });
                    form.appendChild(select);
                });

                const submitBtn = document.createElement('button');
                submitBtn.textContent = 'Submit';
                submitBtn.className = 'alert-button alert-button-submit';
                
                submitBtn.onclick = () => {
                    const formData = {
                        alert_id: data.alert_id,
                        role: 'cdrrmo',
                        lat: data.lat,
                        lon: data.lon,
                        barangay: data.barangay,
                        emergency_type: 'Road Accident',
                        municipality: '{{ municipality }}'.toLowerCase(),
                        timestamp: data.timestamp
                    };

                    const combinedCT = form.querySelector('select[name="combined_cause_type"]').value;
                    const combinedWR = form.querySelector('select[name="combined_weather_road"]').value;

                    if (combinedCT) {
                        const [cause, type] = combinedCT.split(', ');
                        formData['road_accident_cause'] = cause;
                        formData['road_accident_type'] = type;
                    }
                    if (combinedWR) {
                        const [weather, road] = combinedWR.split(', ');
                        formData['weather'] = weather;
                        formData['road_condition'] = road;
                    }

                    form.querySelectorAll('select').forEach(s => {
                        if (s.name !== 'combined_cause_type' && s.name !== 'combined_weather_road') {
                            formData[s.name] = s.value;
                        }
                    });

                    socket.emit('cdrrmo_response', formData);

                    container.innerHTML = '<span style="color: #27ae60; font-weight: bold;">SUBMITTED</span>';
                    const row = container.closest('tr');
                    if(row) {
                        row.querySelector('.status-cell').innerHTML = '<span class="status-responded" style="color: #27ae60; font-weight: bold;">RESPONDED</span>';
                        
                        // Show prediction in actions cell
                        const predictionSpan = document.createElement('div');
                        predictionSpan.innerHTML = '<em>Calculating prediction...</em>';
                        predictionSpan.className = 'prediction-text';
                        predictionSpan.style.fontSize = '12px';
                        predictionSpan.style.color = 'black';
                        container.appendChild(predictionSpan);
                    }
                    setTimeout(() => moveToRecent(data.alert_id), 60000);

                };
                form.appendChild(submitBtn);
                container.appendChild(form);
            }

            function parseMenuText(text) {
                const sections = text.split('#').filter(section => section.trim());
                const menuData = {};
                sections.forEach(section => {
                    const lines = section.trim().split('\n');
                    const sectionName = lines[0].trim();
                    const sectionData = {};
                    lines.slice(1).forEach(line => {
                        const [key, values] = line.split(':');
                        sectionData[key.trim()] = values.split(',').map(v => v.trim());
                    });
                    menuData[sectionName] = sectionData;
                });
                return menuData;
            }

            function notifyAlert(data) {
                const n = document.getElementById('notification');
                n.textContent = `New Road Accident Alert at ${data.barangay}`;
                setTimeout(() => n.textContent = '', 6000);
            }

            // Close modal
            document.querySelector('.close-btn').addEventListener('click', () => {
                document.getElementById('image-modal').style.display = 'none';
            });

            // Date filter
            document.getElementById('recent-date-filter').addEventListener('change', (e) => {
                const val = e.target.value;
                document.querySelectorAll('#recent-alert-container .alert-item').forEach(item => {
                    const timeText = item.querySelector('div:nth-child(4)').textContent;
                    item.style.display = (!val || timeText.includes(val)) ? 'block' : 'none';
                });
            });
        });
    </script>
